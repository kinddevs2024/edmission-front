<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />

    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#84CC16" />
    <meta name="robots" content="index, follow, max-snippet:-1, max-image-preview:large, max-video-preview:-1" />

    <meta name="author" content="Edmission" />
    <link rel="canonical" href="https://edmission.uz/" />

    <!-- SEO -->
    <title>Edmission - Direct Admission Platform for Students and Universities</title>

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://edmission.uz/" />
    <meta property="og:title" content="Edmission - Direct Admission Platform for Students and Universities" />
    <meta property="og:description" content="Transparent admissions without intermediaries. AI-powered matching, scholarship infrastructure, and direct student-university communication." />

    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:site_name" content="Edmission" />
    <meta property="og:locale" content="en_US" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Edmission - Direct Admission Platform for Students and Universities" />
    <meta name="twitter:description" content="Transparent admissions without intermediaries. AI-powered matching, scholarship infrastructure, and direct student-university communication." />
    <meta name="twitter:image" content="https://edmission.uz/og-image.svg" />

    <!-- Language alternates -->
    <link rel="alternate" hreflang="en" href="https://edmission.uz/?lang=en" />
    <link rel="alternate" hreflang="ru" href="https://edmission.uz/?lang=ru" />
    <link rel="alternate" hreflang="uz" href="https://edmission.uz/?lang=uz" />
    <link rel="alternate" hreflang="x-default" href="https://edmission.uz/?lang=en" />

        "inLanguage": ["en", "ru", "uz"]
      }

    <link rel="preconnect" href="https://fonts.googleapis.com" />
